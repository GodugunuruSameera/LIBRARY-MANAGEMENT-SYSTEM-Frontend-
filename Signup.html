<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>MyLibrary | Register</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <div class="navbar"><h2>📚 MyLibrary</h2><div class="nav-links"><a href="index.html">Home</a><a href="login.html">Login</a></div></div>
  </header>

  <div class="container" style="display:flex; justify-content:center; align-items:center;">
    <div class="form-box" style="width:100%;">
      <h2 style="text-align:center; color:var(--primary); margin-bottom:20px;">Become a Member</h2>
      <p id="msg" class="message"></p>
      <form onsubmit="handleSignup(event)">
        <input type="text" id="name" placeholder="Full Name">
        <input type="email" id="email" placeholder="Email Address">
        <input type="password" id="password" placeholder="Password">
        <input type="password" id="confirmPassword" placeholder="Confirm Password">
        <button type="submit" style="margin-top:20px;">Register</button>
      </form>
      <p style="text-align:center; margin-top:15px; font-size:0.9rem;">Already a member? <a href="login.html" style="color:var(--secondary);">Login here</a></p>
    </div>
  </div>

  <script src="js/auth.js"></script>
</body>
</html>
